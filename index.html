<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPlayer JW</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            background: #0a0a0a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid #1a1a1a;
        }
        .header {
            padding: 14px 20px;
            background: #111;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #222;
        }
        .logo {
            font-size: 1.2em;
            font-weight: 700;
            color: #f14f4f;
        }
        .url-box {
            flex: 1;
            display: flex;
            gap: 8px;
        }
        .url-box input {
            flex: 1;
            padding: 10px 14px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.85em;
            outline: none;
        }
        .btn {
            padding: 10px 16px;
            background: #f14f4f;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
        .player-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        #jwplayer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .loading {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            color: #aaa;
            font-size: 0.9em;
        }
        .info-bar {
            padding: 10px 20px;
            background: #111;
            border-top: 1px solid #222;
            font-size: 0.8em;
            color: #888;
        }
        .stream-info {
            color: #f14f4f;
            font-family: monospace;
            font-size: 0.7em;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">▶ ProPlayer</div>
            <div class="url-box">
                <input type="text" id="urlInput" value="https://vibuxer.com/e/83kqfqtghrdx" placeholder="URL del video...">
                <button class="btn" onclick="cargarVideo()">Cargar</button>
            </div>
        </div>
        
        <div class="player-box">
            <div class="loading" id="loadingMsg">Presiona Cargar para iniciar</div>
            <div id="jwplayer"></div>
        </div>
        
        <div class="info-bar">
            📡 Stream: <span class="stream-info" id="streamDisplay">-</span>
        </div>
    </div>
    
    <script src="https://content.jwplatform.com/libraries/XeGdlzmk.js"></script>
    
    <script>
        // Streams conocidos
        const STREAMS = {
            '83kqfqtghrdx': 'https://vibuxer.com/stream/1ZKkyLZiMTYvkTaTbWU7cw/kjhhiuahiughidf/1784644908/17289178/master.m3u8'
        };
        
        let player = null;
        
        async function cargarVideo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            
            const idMatch = url.match(/\/e\/([a-zA-Z0-9]+)/);
            const videoId = idMatch ? idMatch[1] : null;
            
            document.getElementById('loadingMsg').innerHTML = '🔍 Buscando stream...';
            let streamUrl = null;
            
            // 1. Stream conocido
            if (videoId && STREAMS[videoId]) {
                streamUrl = STREAMS[videoId];
                document.getElementById('loadingMsg').innerHTML = '✅ Stream conocido';
            }
            
            // 2. Intentar extraer del HTML usando el proxy de Netlify
            if (!streamUrl) {
                try {
                    // Usar el proxy de Netlify (_redirects)
                    const proxyUrl = '/api/' + url.replace('https://', '');
                    const response = await fetch(proxyUrl);
                    const html = await response.text();
                    
                    // Buscar m3u8 en el HTML
                    const match = html.match(/"file"\s*:\s*"([^"]+\.m3u8)"/i);
                    if (match) {
                        let path = match[1];
                        if (path.startsWith('/')) {
                            const urlObj = new URL(url);
                            path = urlObj.origin + path;
                        }
                        streamUrl = path;
                        document.getElementById('loadingMsg').innerHTML = '✅ Stream extraído';
                    }
                } catch(e) {
                    console.log('Extracción fallida:', e);
                }
            }
            
            // 3. Fallback
            if (!streamUrl) {
                streamUrl = STREAMS['83kqfqtghrdx'];
                document.getElementById('loadingMsg').innerHTML = '⚠️ Usando stream alternativo';
            }
            
            if (streamUrl) {
                document.getElementById('streamDisplay').textContent = streamUrl;
                initPlayer(streamUrl);
            } else {
                document.getElementById('loadingMsg').innerHTML = '❌ No se encontró stream';
            }
        }
        
        function initPlayer(streamUrl) {
            if (player) jwplayer('jwplayer').remove();
            
            document.getElementById('loadingMsg').innerHTML = '▶ Cargando JW Player...';
            
            jwplayer('jwplayer').setup({
                file: streamUrl,
                type: 'hls',
                width: '100%',
                height: '100%',
                aspectratio: '16:9',
                autostart: true,
                primary: 'html5',
                hlshtml: true,
                androidhls: true,
                skin: {
                    name: 'bekle',
                    active: '#f14f4f',
                    inactive: '#999',
                    background: '#000'
                },
                playbackRateControls: [0.5, 0.75, 1, 1.25, 1.5, 2],
                logo: { hide: true }
            });
            
            jwplayer('jwplayer').on('ready', function() {
                document.getElementById('loadingMsg').style.display = 'none';
            });
            
            jwplayer('jwplayer').on('error', function() {
                document.getElementById('loadingMsg').innerHTML = '⚠️ Error de reproducción';
                document.getElementById('loadingMsg').style.display = 'flex';
            });
            
            player = jwplayer('jwplayer');
        }
        
        // Cargar automáticamente
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(cargarVideo, 500);
        });
        
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') cargarVideo();
        });
    </script>
</body>
</html>
